name: Quarto Publish

on:
  workflow_dispatch:
  push:
    branches: main
  schedule:
    - cron: '01 05 * * *'  # Run every day, shortly after midnight EST

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Force Node.js 24 early (helps compatibility & reduces warnings)

    steps:
      - name: Check out repository
        uses: actions/checkout@v6          # Upgraded from v4 → uses Node.js 24

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'              # Gets the latest stable R version automatically

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}